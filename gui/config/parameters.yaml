#Parameters loaded on starting the debug GUI

travConfig:

  # grid
  gridResolution: 1.0
  initialPatchVariance: 0.0001

  # robot dimensions
  robotHeight: 3.0
  robotSizeX: 6.0
  robotSizeY: 3.0
  distToGround: 0.0
  articulatedSuspension: true  # if false, the robot is modeled with a rigid chassis/axles

  # slope / terrain constraints
  maxSlope: 0.45                # [rad]
  maxStepHeight: 0.45
  inclineLimittingMinSlope: 0.2
  inclineLimittingLimit: 0.1

  # slope metric
  slopeMetric: "NONE"          # options: NONE, AVG_SLOPE, MAX_SLOPE, TRIANGLE_SLOPE
  slopeMetricScale: 1.0

  # traversability estimation
  costFunctionDist: 0.0
  minTraversablePercentage: 0.4

  # movement logic
  allowForwardDownhill: true
  enableInclineLimitting: false

  # soil information
  useSoilInformation: true
  traverseSand: false
  traverseRocks: false
  traverseGravel: true
  traverseConcrete: true

  # obstacle inflation for safety margins (scales the inflation gap beyond the
  # AABB/OBB collision radius).  Minimum enforced value is 1.0 — setting it lower
  # is silently clamped and a warning is logged, because the step-height check only
  # searches within min(robotSizeX, robotSizeY)/2 and inflation must cover the rest
  # of the footprint.  Increase above 1.0 for extra safety margins.
  obstacleInflationMultiplier: 1.0
